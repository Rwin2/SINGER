cohort: "ssv_dagger_potential"
method: "rrt"

review: false

Nep_his: 100
Nep_com: 150

Nep_dagger: 20
n_eval_per_iter: 10
n_benchmark: 50
lim_sv: 10

# DAgger mode: online (False) = retrain only on current iter, prevents forgetting
aggregate_dagger: false
# Position noise (m) added to initial state for trajectory diversity
start_pos_noise: 0.5
# Option B: full-trajectory collection + annotation filtering
deviation_filter_dist: 0.3   # keep if drone drifted >0.3m from reference
close_approach_dist: 5.0     # always keep if within 5m of goal

flights:
  - ["flightroom_ssv_exp", "flightroom_ssv_exp"]

roster:
  - "InstinctJester"
